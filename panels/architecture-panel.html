<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>厕所架构内容</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter','Microsoft YaHei','Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;padding:26px;max-width:920px;margin:0 auto;}h2{font-size:1.7rem;color:#0a2b4e;margin-bottom:14px;}p.lead{color:#475569;margin-bottom:18px;}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;}h3{font-size:1rem;color:#0a2b4e;margin-bottom:6px;}.card p{font-size:.92rem;color:#334155;line-height:1.6;}</style>
</head>
<body>
<h2>厕所架构</h2>
<p class="lead">采用“决策-执行-监督”三层治理，保证机制稳定运行。</p>
<div class="grid">
<div class="card"><h3>中央委员会</h3><p>负责年度规划、预算统筹与重大事项审批。</p></div>
<div class="card"><h3>设施运行处</h3><p>承担设施维护、清洁协同与值班管理。</p></div>
<div class="card"><h3>信息化组</h3><p>维护报修系统、巡检看板和数据平台。</p></div>
<div class="card"><h3>学生联络组</h3><p>收集反馈并推动议题进入整改流程。</p></div>
<div class="card"><h3>监督评估组</h3><p>开展抽查评估并发布质量报告。</p></div>
<div class="card"><h3>应急专班</h3><p>处理突发停水与设施故障等应急事件。</p></div>
</div>
</body>
</html>
