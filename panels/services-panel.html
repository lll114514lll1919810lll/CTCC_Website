<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>如厕服务内容</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter','Microsoft YaHei','Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;padding:26px;max-width:920px;margin:0 auto;}h2{font-size:1.7rem;color:#0a2b4e;margin-bottom:14px;}p.lead{color:#475569;margin-bottom:18px;}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px;}.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;}.card h3{font-size:1rem;color:#0a2b4e;margin-bottom:6px;}.card p{font-size:.92rem;color:#334155;line-height:1.6;}ol{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px 14px 34px;}li{margin:7px 0;color:#334155;}</style>
</head>
<body>
<h2>如厕服务</h2>
<p class="lead">提供报修、建议反馈、失物招领和无障碍协助等统一入口。</p>
<div class="grid">
<div class="card"><h3>设施报修</h3><p>常规问题 24 小时内响应，支持工单追踪。</p></div>
<div class="card"><h3>卫生建议</h3><p>提交改造建议并进入月度治理评审。</p></div>
<div class="card"><h3>失物招领</h3><p>支持失物登记、照片上传与认领查询。</p></div>
<div class="card"><h3>无障碍协助</h3><p>为有需要师生提供专属值班协助服务。</p></div>
</div>
<ol>
<li>进入服务入口并填写基础信息。</li>
<li>系统生成工单并自动分派处理。</li>
<li>处理完成后收到通知并可在线评价。</li>
</ol>
</body>
</html>
